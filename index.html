<head>

<title>MasterList</title>

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<style>

html,
body{

height:100%;

margin:0;

background-image:url("opc2.jpg");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

font-family:Segoe UI,Tahoma,sans-serif;

}



/**********************
NAVBAR
**********************/

.navbar{

background:linear-gradient(90deg,#002b5c,#005ea8);

box-shadow:0 5px 12px rgba(0,0,0,.30);

}

.navbar-brand{

color:#FFF !important;

font-weight:bold;

font-size:24px;

}

.nav-link{

color:#ffd166 !important;

font-weight:600;

margin-left:8px;

border-radius:30px;

transition:.30s;

}

.nav-link:hover{

background:#ffd166;

color:#002b5c !important;

}

.nav-link.active{

background:#ffd166;

color:#002b5c !important;

}



/**********************
CAJAS
**********************/

.page-section{

display:none;

width:95%;

margin:auto;

margin-top:20px;

background:rgba(255,255,255,.96);

border-radius:12px;

padding:20px;

box-shadow:0 6px 15px rgba(0,0,0,.25);

}



/**********************
BUSCADORES
**********************/

#searchInputIndex,
#searchInputAdvanced{

width:650px;

max-width:100%;

display:block;

margin:auto;

padding:10px;

border-radius:50px;

border:2px solid #ffd166;

text-align:center;

font-size:18px;

margin-bottom:15px;

}



/**********************
TABLAS
**********************/

.table-container{

overflow:auto;

max-height:72vh;

}

table{

width:100%;

border-collapse:collapse;

}

thead{

position:sticky;

top:0;

z-index:5;

background:linear-gradient(90deg,#004f91,#00a2df);

color:white;

}

th{

padding:12px;

border:1px solid #DDD;

text-align:center;

font-size:15px;

}

td{

padding:8px;

border:1px solid #DDD;

text-align:center;

font-size:14px;

background:white;

}

tbody tr:hover{

background:#f5fbff;

}



/**********************
IMAGENES
**********************/

.tabla-img{

width:180px;

height:180px;

object-fit:cover;

cursor:pointer;

transition:.3s;

}

.tabla-img:hover{

transform:scale(1.05);

}



/**********************
OVERLAY
**********************/

#imgOverlay{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.90);

display:flex;

align-items:center;

justify-content:center;

z-index:99999;

}

#imgOverlay[hidden]{

display:none;

}

#overlayImg{

max-width:98%;

max-height:98%;

}

#overlayClose{

position:absolute;

top:20px;

right:20px;

width:45px;

height:45px;

border:none;

border-radius:8px;

background:#000;

color:white;

font-size:28px;

cursor:pointer;

}



/**********************
BOTONES
**********************/

.btn-imagen{

background:#005ea8;

color:white;

border:none;

padding:5px 15px;

border-radius:5px;

cursor:pointer;

}

.btn-imagen:hover{

background:#003f72;

}
 :root {
      --bubble-bg: #ffffff;
      --bubble-text: #1f2937;
      --bubble-primary: #0f766e;
      --bubble-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      --bubble-shadow-hover: 0 24px 56px rgba(0, 0, 0, 0.24);
    }

    .floating-voucher-bubble {
      position: fixed;
      right: 40px;
      bottom: 40px;
      z-index: 9999;
      width: 92px;
      min-height: 104px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 8px;
      background: var(--bubble-bg);
      color: var(--bubble-text);
      border: 1px solid rgba(15, 118, 110, 0.18);
      border-radius: 20px;
      box-shadow: var(--bubble-shadow);
      text-decoration: none;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .floating-voucher-bubble:hover,
    .floating-voucher-bubble:focus-visible {
      transform: translateY(-3px);
      box-shadow: var(--bubble-shadow-hover);
      border-color: rgba(15, 118, 110, 0.45);
      outline: none;
    }

    .floating-voucher-bubble:focus-visible {
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.22), var(--bubble-shadow-hover);
    }

    .floating-voucher-bubble__image {
      width: 100px;
      height: 100px;
      object-fit: contain;
      display: block;
      border-radius: 20px;
    }

    .floating-voucher-bubble__text {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: lowercase;
    }

    @media (max-width: 880px) {
      .floating-voucher-bubble {
        right: 14px;
        bottom: 14px;
        width: 82px;
        min-height: 94px;
        padding: 8px 6px;
        border-radius: 18px;
      }

      .floating-voucher-bubble__image {
        width: 80px;
        height: 80px;
      }

      .floating-voucher-bubble__text {
        font-size: 18px;
      }
    }
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container-fluid">

<a class="navbar-brand">

ALMACÉN DE PARTES

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div
class="collapse navbar-collapse"
id="menu">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<button
id="btnInicio"
class="nav-link active"
onclick="mostrarSeccion('inicio')">

Búsqueda rápida

</button>

</li>

<li class="nav-item">

<button
id="btnAvanzada"
class="nav-link"
onclick="cargarCategoria('Busqueda avanzada')">

Búsqueda avanzada

</button>

</li>

<li class="nav-item dropdown">

<a
class="nav-link dropdown-toggle"
href="#"
role="button"
data-bs-toggle="dropdown">

Opciones

</a>

<ul
class="dropdown-menu"
id="menuCategorias">

</ul>

</li>

</ul>

<form
class="d-flex"
onsubmit="event.preventDefault();buscarRapido();">

<input

id="searchInputIndex"

type="text"

placeholder="Buscar en todo el almacén..."

onkeyup="buscarRapido()">

</form>

</div>

</div>

</nav>
<!-- ===================================================== -->
<!--                  BUSQUEDA RAPIDA                       -->
<!-- ===================================================== -->

<section id="inicio" class="page-section" style="display:block;">

    <h3 class="text-center mb-4 text-primary">

        BÚSQUEDA RÁPIDA

    </h3>

    <div
        id="contenedorBusquedaRapida"
        class="table-container"
        style="display:none;">

        <table>

            <thead>

                <tr id="headerRapido"></tr>

            </thead>

            <tbody id="bodyRapido"></tbody>

        </table>

    </div>

</section>





<!-- ===================================================== -->
<!--                BUSQUEDA AVANZADA                      -->
<!-- ===================================================== -->

<section id="avanzada" class="page-section">

    <h3
        id="tituloCategoria"
        class="text-center text-primary mb-3">

        BÚSQUEDA AVANZADA

    </h3>

    <h6 class="text-center">

        Escriba código, descripción o marca

    </h6>

    <input

        id="searchInputAdvanced"

        type="text"

        placeholder="Buscar..."

        onkeyup="buscarAvanzado()">

    <div class="table-container">

        <table id="tablaAvanzada">

            <thead>

                <tr id="headerAvanzado"></tr>

            </thead>

            <tbody id="bodyAvanzado"></tbody>

        </table>

    </div>

</section>





<!-- ===================================================== -->
<!--               VISOR DE IMAGENES                       -->
<!-- ===================================================== -->

<div

id="imgOverlay"

hidden>

<button

id="overlayClose"

type="button">

✕

</button>

<img

id="overlayImg"

src=""

alt="Imagen">

</div>





<!-- ===================================================== -->
<!--                VARIABLES GLOBALES                     -->
<!-- ===================================================== -->

<script>

let libroExcel=null;

let datosBusquedaRapida=[];

let hojaActual=[];

let nombreHojaActual="Busqueda avanzada";

/*********************************************************************
 *              CARGAR EL LIBRO DE EXCEL UNA SOLA VEZ
 *********************************************************************/

async function cargarLibroExcel(){

    try{

        const response = await fetch("Busqueda avanzada.xlsx");

        const buffer = await response.arrayBuffer();

        libroExcel = XLSX.read(buffer,{
            type:"array"
        });

        cargarDatosBusquedaRapida();

crearMenuCategorias();

cargarCategoria(libroExcel.SheetNames[0]);

    }

    catch(error){

        console.error(error);

        alert("No fue posible cargar el archivo Busqueda avanzada.xlsx");

    }

}

/*********************************************************************
 *           CARGAR DATOS PARA LA BUSQUEDA RAPIDA
 *********************************************************************/

function cargarDatosBusquedaRapida(){

    const hoja=libroExcel.Sheets["Busqueda avanzada"];

    datosBusquedaRapida=XLSX.utils.sheet_to_json(

        hoja,

        {header:1}

    );

}

/*********************************************************************
 *             CAMBIAR ENTRE SECCIONES
 *********************************************************************/

function mostrarSeccion(nombre){

    document
    .querySelectorAll(".page-section")
    .forEach(sec=>{

        sec.style.display="none";

    });

    if(nombre==="inicio"){

        document
        .getElementById("inicio")
        .style.display="block";

    }

    else{

        document
        .getElementById("avanzada")
        .style.display="block";

    }

}

/*********************************************************************
 *      CARGAR UNA PESTAÑA DEL EXCEL SEGUN LA CATEGORIA
 *********************************************************************/
function crearMenuCategorias(){

    const menu=document.getElementById("menuCategorias");

    menu.innerHTML="";

    libroExcel.SheetNames.forEach(nombre=>{

        if(nombre==="Busqueda avanzada") return;

        const li=document.createElement("li");

        const a=document.createElement("a");

        a.className="dropdown-item";

        a.href="#";

        a.innerHTML=nombre;

        a.onclick=function(){

            cargarCategoria(nombre);

        };

        li.appendChild(a);

        menu.appendChild(li);

    });

}
function cargarCategoria(nombreHoja){

    if(!libroExcel)return;

    nombreHojaActual=nombreHoja;

    mostrarSeccion("avanzada");

    document
    .getElementById("tituloCategoria")
    .innerHTML=nombreHoja;

    const hoja=libroExcel.Sheets[nombreHoja];

    if(!hoja){

        alert("No existe la pestaña: "+nombreHoja);

        return;

    }

    hojaActual=XLSX.utils.sheet_to_json(

        hoja,

        {

            header:1

        }

    );

    dibujarTablaAvanzada();

}

/*********************************************************************
 *           DIBUJAR TABLA AVANZADA
 *********************************************************************/

function dibujarTablaAvanzada(){

    const encabezado=document.getElementById("headerAvanzado");

    const cuerpo=document.getElementById("bodyAvanzado");

    encabezado.innerHTML="";

    cuerpo.innerHTML="";

    if(hojaActual.length===0)return;

    hojaActual[0].forEach(texto=>{

        let th=document.createElement("th");

        th.textContent=texto;

        encabezado.appendChild(th);

    });

    for(let i=1;i<hojaActual.length;i++){

        let fila=document.createElement("tr");

        hojaActual[i].forEach(valor=>{

            let td=document.createElement("td");

            const texto=String(valor||"").trim();

            const esImagen=/\.(jpg|jpeg|png|gif|webp)$/i.test(texto);

            if(esImagen){

                const img=document.createElement("img");

                img.src=texto;

                img.className="tabla-img";

                img.onclick=function(){

                    abrirImagen(texto);

                };

                td.appendChild(img);

            }

            else{

                td.textContent=texto;

            }

            fila.appendChild(td);

        });

        cuerpo.appendChild(fila);

    }

}
/*********************************************************************
 *                  BUSQUEDA RAPIDA
 *********************************************************************/

function buscarRapido(){

    const texto=document
        .getElementById("searchInputIndex")
        .value
        .toLowerCase()
        .trim();

    const encabezado=document.getElementById("headerRapido");
    const cuerpo=document.getElementById("bodyRapido");
    const contenedor=document.getElementById("contenedorBusquedaRapida");

    encabezado.innerHTML="";
    cuerpo.innerHTML="";

    if(texto===""){

        contenedor.style.display="none";
        return;

    }

    contenedor.style.display="block";

    if(datosBusquedaRapida.length===0)return;

    /* Encabezados */

    datosBusquedaRapida[0].forEach(columna=>{

        const th=document.createElement("th");
        th.textContent=columna;
        encabezado.appendChild(th);

    });

    /* Filas */

    for(let i=1;i<datosBusquedaRapida.length;i++){

        const filaExcel=datosBusquedaRapida[i];

        const coincide=filaExcel.some(celda=>{

            return String(celda||"")
                .toLowerCase()
                .includes(texto);

        });

        if(!coincide)continue;

        const tr=document.createElement("tr");

        filaExcel.forEach(valor=>{

            const td=document.createElement("td");

            const textoCelda=String(valor||"").trim();

            const esImagen=/\.(jpg|jpeg|png|gif|webp)$/i.test(textoCelda);

            if(esImagen){

                const boton=document.createElement("button");

                boton.className="btn-imagen";

                boton.innerHTML="Ver Imagen";

                boton.onclick=()=>abrirImagen(textoCelda);

                td.appendChild(boton);

            }

            else{

                td.textContent=textoCelda;

            }

            tr.appendChild(td);

        });

        cuerpo.appendChild(tr);

    }

}

/*********************************************************************
 *              BUSQUEDA AVANZADA
 *********************************************************************/

function buscarAvanzado(){

    const texto=document
        .getElementById("searchInputAdvanced")
        .value
        .toLowerCase()
        .trim();

    const filas=document.querySelectorAll("#bodyAvanzado tr");

    filas.forEach(fila=>{

        const columnas=fila.querySelectorAll("td");

        let encontrado=false;

        for(let i=0;i<Math.min(columnas.length,3);i++){

            const td=columnas[i];

            if(td.querySelector("img"))continue;

            if(td.textContent
                .toLowerCase()
                .includes(texto)){

                encontrado=true;
                break;

            }

        }

        fila.style.display=(texto===""||encontrado)
            ?""
            :"none";

    });

}

/*********************************************************************
 *                  ABRIR IMAGEN
 *********************************************************************/

function abrirImagen(ruta){

    document
        .getElementById("overlayImg")
        .src=ruta;

    document
        .getElementById("imgOverlay")
        .hidden=false;

}

/*********************************************************************
 *                  CERRAR IMAGEN
 *********************************************************************/

function cerrarImagen(){

    document
        .getElementById("imgOverlay")
        .hidden=true;

    document
        .getElementById("overlayImg")
        .src="";

}

document
    .getElementById("overlayClose")
    .addEventListener("click",cerrarImagen);

document
    .getElementById("imgOverlay")
    .addEventListener("click",function(e){

        if(e.target.id==="imgOverlay"){

            cerrarImagen();

        }

});

document.addEventListener("keydown",function(e){

    if(e.key==="Escape"){

        cerrarImagen();

    }

});
/*********************************************************************
 *              ACTIVAR BOTON DEL MENU
 *********************************************************************/

function activarBoton(nombre){

    document
        .querySelectorAll(".nav-link")
        .forEach(btn=>btn.classList.remove("active"));

    if(nombre==="inicio"){

        document
            .getElementById("btnInicio")
            .classList.add("active");

    }else{

        document
            .getElementById("btnAvanzada")
            .classList.add("active");

    }

}


/*********************************************************************
 *      REEMPLAZAR mostrarSeccion PARA ACTIVAR EL MENU
 *********************************************************************/

const mostrarSeccionOriginal = mostrarSeccion;

mostrarSeccion = function(nombre){

    mostrarSeccionOriginal(nombre);

    activarBoton(nombre);

};


/*********************************************************************
 *          CARGAR CATEGORIA Y ACTIVAR BOTON
 *********************************************************************/

const cargarCategoriaOriginal = cargarCategoria;

cargarCategoria = function(nombreHoja){

    cargarCategoriaOriginal(nombreHoja);

    activarBoton("avanzada");

};


/*********************************************************************
 *              INICIALIZACION
 *********************************************************************/

window.addEventListener("load",async function(){

    await cargarLibroExcel();

    mostrarSeccion("inicio");

});


</script>

    class="floating-voucher-bubble"

    aria-label="Ir a vale electrónico almacén"
  >
    <img

      loading="lazy"
    />
    <span class="floating-voucher-bubble__text">vale electronico almacen >>CLIC AQUI<< </span>

</body>
